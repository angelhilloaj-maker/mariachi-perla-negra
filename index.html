<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Presupuesto Perla Negra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --negro: #121212; --dorado: #d4af37; --perla: #f8f8f8; }
        body { font-family: 'Poppins', sans-serif; background-color: #1a1a1a; color: white; padding: 10px; margin: 0; }
        .app-container { max-width: 450px; margin: auto; background: var(--negro); border: 2px solid var(--dorado); border-radius: 15px; overflow: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--dorado); }
        .header h1 { font-family: 'Cinzel', serif; color: var(--dorado); margin: 0; font-size: 20px; }
        .content { padding: 20px; }
        label { display: block; font-size: 11px; color: var(--dorado); margin-top: 15px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; }
        .msg-error { background: #5a1212; color: #ff9999; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 12px; display: none; text-align: center; border: 1px solid red; }
        .resumen-caja { background: var(--dorado); color: black; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .total-txt { font-size: 24px; font-weight: bold; display: block; }
        .btn-enviar { display: block; width: 100%; padding: 15px; background: #25d366; color: white; text-align: center; text-decoration: none; border-radius: 10px; margin-top: 15px; font-weight: bold; }
        .nota { font-size: 10px; color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>MARIACHI PERLA NEGRA</h1>
        <small>COTIZADOR OFICIAL</small>
    </div>

    <div class="content">
        <label>Nombre</label>
        <input type="text" id="nom" placeholder="Tu nombre">

        <label>Fecha</label>
        <input type="date" id="fec" onchange="hacerCuentas()">

        <label>Agrupación</label>
        <select id="elem" onchange="hacerCuentas()">
            <option value="5">5 Elementos</option>
            <option value="6">6 Elementos</option>
            <option value="8">8 Elementos</option>
            <option value="11">11 Elementos</option>
        </select>
        
        <p class="nota">* Lunes a Jueves: Todas las opciones.<br>* Vie, Sáb y Dom: Solo 8 elementos.</p>

        <div id="error" class="msg-error">ESTA AGRUPACIÓN NO DISPONIBLE EN FIN DE SEMANA</div>

        <label>Horas</label>
        <input type="number" id="hrs" value="1" min="1" oninput="hacerCuentas()">

        <div class="resumen-caja">
            <small>TOTAL ESTIMADO</small>
            <span class="total-txt" id="total">$0.00</span>
        </div>

        <a href="#" class="btn-enviar" onclick="enviar()">RESERVAR FECHA</a>
    </div>
</div>

<script>
    function hacerCuentas() {
        const f = document.getElementById('fec').value;
        const e = parseInt(document.getElementById('elem').value);
        const h = parseInt(document.getElementById('hrs').value) || 1;
        const error = document.getElementById('error');
        const totalVista = document.getElementById('total');

        if (!f) return;

        // Detectar día: 0=D, 5=V, 6=S
        const fechaPartes = f.split('-');
        const diaNum = new Date(fechaPartes[0], fechaPartes[1] - 1, fechaPartes[2]).getDay();
        const esFinde = (diaNum === 0 || diaNum === 5 || diaNum === 6);

        // RESTRICCIÓN
        if (esFinde && e !== 8) {
            error.style.display = "block";
            totalVista.innerText = "---";
            return;
        } else {
            error.style.display = "none";
        }

        let precio = 0;
        if (e === 5) precio = 2000;
        if (e === 6) precio = 2300;
        if (e === 8) precio = 2800;
        if (e === 11) precio = 4200;

        let resultado = precio * h;
        
        // Regla especial 8 elementos
        if (e === 8 && h >= 2) {
            resultado = (h === 2) ? 5000 : 5000 + ((h - 2) * 2200);
        }

        totalVista.innerText = "$" + resultado.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    function enviar() {
        const t = document.getElementById('total').innerText;
        const n = document.getElementById('nom').value || "Cliente";
        const f = document.getElementById('fec').value;
        const e = document.getElementById('elem').options[document.getElementById('elem').selectedIndex].text;

        if (t === "---" || t === "$0.00") {
            alert("Selecciona una opción válida para esa fecha.");
            return;
        }

        const m = `Hola Perla Negra, coticé:\nCliente: ${n}\nFecha: ${f}\nGrupo: ${e}\nTotal: ${t}`;
        window.open(`https://wa.me/522223976646?text=${encodeURIComponent(m)}`);
    }
</script>

</body>
</html>
