
<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto Perla Negra</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
:root {
    --negro: #121212;
    --dorado: #d4af37;
    --perla: #f8f8f8;
    --input-bg: #1e1e1e;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: #f0f0f0;
    margin: 0;
    padding: 10px;
}

.cotizacion-export {
    max-width: 500px;
    margin: auto;
    background: var(--negro);
    color: var(--perla);
    border-radius: 20px;
    border: 3px solid var(--dorado);
    overflow: hidden;
}

.header {
    padding: 25px;
    text-align: center;
    background: linear-gradient(135deg, #2a2a2a, #0a0a0a);
}

.header h1 {
    font-family: 'Cinzel', serif;
    color: var(--dorado);
}

.form-section {
    padding: 15px 20px;
}

.section-title {
    color: var(--dorado);
    font-size: 13px;
    margin-bottom: 10px;
}

label {
    font-size: 10px;
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: var(--input-bg);
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
}

.resumen {
    background: var(--dorado);
    color: black;
    padding: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
}

.total {
    font-size: 18px;
    margin-top: 10px;
}

.btn-wa {
    width: 100%;
    padding: 15px;
    background: #25d366;
    color: white;
    border: none;
    margin-top: 15px;
    border-radius: 10px;
}
</style></head><body><div class="cotizacion-export"><div class="header">
<h1>MARIACHI PERLA NEGRA</h1>
</div><div class="form-section"><div id="aviso-festivo" style="display:none; color:yellow; text-align:center;">
✨ FECHA ESPECIAL ✨
</div><label>Nombre</label>
<input type="text" id="nombre_cliente">

<label>Fecha</label>
<input type="date" id="fecha" onchange="actualizarInterfaz()">

<label>Elementos</label>
<select id="elementos" onchange="calcular()">

<option value="">Elegir fecha...</option>
</select><label>Horas</label>
<input type="number" id="horas" value="1" min="1" oninput="calcular()">

</div><div class="resumen"><div id="mensaje-beneficio" style="display:none;">
⭐ PROMOCIÓN ACTIVADA
</div><div class="row">
<span>Precio por Hora:</span>
<span id="precio_unitario">$0.00</span>
</div><div class="row total">
<span>Total:</span>
<span id="total_resumen">$0.00</span>
</div></div></div><script>
const festivos = ["05-10", "06-21", "09-15", "12-25", "01-01"];

function actualizarInterfaz() {
    const fechaVal = document.getElementById('fecha').value;
    const select = document.getElementById('elementos');
    const aviso = document.getElementById('aviso-festivo');

    select.innerHTML = "";

    if (!fechaVal) {
        select.innerHTML = '<option>Elegir fecha...</option>';
        return;
    }

    const fecha = new Date(fechaVal);
    const dia = fecha.getDay();

    const mesDia = fechaVal.substring(5);
    const esFestivo = festivos.includes(mesDia);
    const esFinDeSemana = (dia === 0 || dia === 6);

    if (esFinDeSemana) {
        aviso.style.display = "none";
        select.innerHTML = `<option value="8">8 Elementos</option>`;
    }
    else if (esFestivo) {
        aviso.style.display = "block";
        select.innerHTML = `<option value="8">8 Elementos</option>`;
    }
    else {
        aviso.style.display = "none";
        select.innerHTML = `
            <option value="6">6 Elementos</option>
            <option value="7">7 Elementos</option>
            <option value="8">8 Elementos</option>
        `;
    }

    calcular();
}

function calcular() {
    const elementos = document.getElementById('elementos').value;
    const horas = document.getElementById('horas').value;

    if (!elementos || !horas) return;

    let precio = 0;

    if (elementos == 6) precio = 2500;
    if (elementos == 7) precio = 3000;
    if (elementos == 8) precio = 3500;

    let total = precio * horas;

    if (horas >= 2) {
        total *= 0.9;
        document.getElementById('mensaje-beneficio').style.display = "block";
    } else {
        document.getElementById('mensaje-beneficio').style.display = "none";
    }

    document.getElementById('precio_unitario').innerText = "$" + precio.toFixed(2);
    document.getElementById('total_resumen').innerText = "$" + total.toFixed(2);
}
</script></body>
</html>
